[package]
name = "libp2p-quic"
version = "0.19.0"
authors = ["Parity Technologies <admin@parity.io>"]
edition = "2018"
license = "MIT"
description = "A libp2p transport using QUIC"
keywords = ["peer-to-peer", "libp2p", "quic", "networking"]
categories = ["network-programming", "asynchronous"]

[dependencies]
async-std = "1.6.3"
either = "1.6.0"
env_logger = "0.7.1"
futures = "0.3.5"
futures-timer = "3.0.2"
ipnet = "2.3.0"
libp2p-core = "0.21.0"
log = "0.4.11"
parking_lot = "0.11.0"
quinn-proto = "0.6.1"
rcgen = { version = "0.8.5", default-features = false }
ring = "0.16.15"
rustls = { version = "0.18.1", features = ["dangerous_configuration"] }
thiserror = "1.0.20"
untrusted = "0.7.1"
webpki = "0.21.3"
yasna = "0.3.2"

# TODO: RGMLRMLG fix that crate name
[dependencies.x509-signature]
version = "0.5.0"
features = ["webpki", "rustls", "std"]

[patch.crates-io]
quinn-proto = { git = "https://github.com/djc/quinn" }
